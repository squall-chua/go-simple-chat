syntax = "proto3";

package chat.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/api/annotations.proto";

option go_package = "go-simple-chat/api/v1;chatv1";

service ChatService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse) {
    option (google.api.http) = {
      get: "/v1/health"
    };
  }

  // Auth/Registration
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/v1/register"
      body: "*"
    };
  }

  // Identity Renewal (for expired certificates)
  rpc GetChallenge(GetChallengeRequest) returns (GetChallengeResponse) {
    option (google.api.http) = {
      post: "/v1/auth/challenge"
      body: "*"
    };
  }

  rpc RenewCertificate(RenewCertificateRequest) returns (RenewCertificateResponse) {
    option (google.api.http) = {
      post: "/v1/auth/renew"
      body: "*"
    };
  }

  // Messaging
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse) {
    option (google.api.http) = {
      post: "/v1/channels/{channel_id}/messages"
      body: "*"
    };
  }

  // Real-time bidirectional streaming for chat and presence
  rpc BidiStreamChat(stream StreamMessageRequest) returns (stream StreamMessageResponse) {}

  // Channel Management
  rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse) {
    option (google.api.http) = {
      post: "/v1/channels"
      body: "*"
    };
  }

  rpc AddParticipant(AddParticipantRequest) returns (AddParticipantResponse) {
    option (google.api.http) = {
      post: "/v1/channels/{channel_id}/participants"
      body: "*"
    };
  }

  rpc MarkAsRead(MarkAsReadRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/channels/{channel_id}/read"
      body: "*"
    };
  }

  // Media
  rpc UploadFile(UploadFileRequest) returns (UploadFileResponse) {
    option (google.api.http) = {
      post: "/v1/upload"
      body: "*"
    };
  }

  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse) {
    option (google.api.http) = {
      get: "/v1/channels"
    };
  }

  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse) {
    option (google.api.http) = {
      get: "/v1/channels/{channel_id}/messages"
    };
  }

  // Presence
  rpc GetPresence(GetPresenceRequest) returns (GetPresenceResponse) {
    option (google.api.http) = {
      get: "/v1/users/{user_id}/presence"
    };
  }
}

message HealthCheckRequest {}
message HealthCheckResponse {
  string status = 1;
}

message RegisterRequest {
  string username = 1;
  bytes public_key = 2; // User's public key for E2E encryption info
}


message Media {
  string type = 1; // e.g., image, video, voice, file
  string url = 2;
  string name = 3;
}

message UploadFileRequest {
  string filename = 1;
  bytes data = 2;
  string content_type = 3;
}

message UploadFileResponse {
  string url = 1;
  string name = 2;
}

message RegisterResponse {
  string user_id = 1;
  bytes certificate = 2; // Issued client certificate
  bytes private_key = 3; // Issued client private key (if server generates it, which it does in our CA model)
}

message GetChallengeRequest {
  string username = 1;
}

message GetChallengeResponse {
  string user_id = 1;
  string nonce = 2;
}

message RenewCertificateRequest {
  string user_id = 1;
  bytes signature = 2; // Signature of the nonce
}

message RenewCertificateResponse {
  bytes certificate = 1;
}

message SendMessageRequest {
  string channel_id = 1;
  string content = 2;
  repeated Media medias = 3;
  string thread_id = 4;
  string parent_id = 5;
}

message SendMessageResponse {
  string message_id = 1;
}

message StreamMessageRequest {
  oneof payload {
    SendMessageRequest send_message = 1;
    Heartbeat heartbeat = 2;
  }
}

message StreamMessageResponse {
  oneof payload {
    MessageReceived message_received = 1;
    PresenceEvent presence_event = 2;
    ChannelJoined channel_joined = 3;
    ParticipantAdded participant_added = 4;
    ErrorEvent error = 5;
    IdentityEvent identity_event = 6;
  }
}

message IdentityEvent {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_EXPIRING_SOON = 1;
    TYPE_EXPIRED = 2;
  }
  Type type = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message ParticipantAdded {
  string channel_id = 1;
  string user_id = 2;
  string username = 3;
}

message Heartbeat {}

message MessageReceived {
  string message_id = 1;
  string channel_id = 2;
  string sender_id = 3;
  string sender_username = 4;
  string content = 5;
  repeated Media medias = 6;
  string thread_id = 7;
  string parent_id = 8;
  google.protobuf.Timestamp created_at = 9;
}

message PresenceEvent {
  string user_id = 1;
  bool online = 2;
}

message ErrorEvent {
  string code = 1;
  string message = 2;
}

message ChannelJoined {
  string channel_id = 1;
  string name = 2;
}

message GetPresenceRequest {
  string user_id = 1;
  string username = 2;
}

message GetPresenceResponse {
  bool online = 1;
  google.protobuf.Timestamp last_seen = 2;
}

message CreateChannelRequest {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_DIRECT = 1;
    TYPE_GROUP = 2;
  }
  Type type = 1;
  repeated string participants = 2;
  repeated string participant_usernames = 3;
  string name = 4;
}

message CreateChannelResponse {
  string channel_id = 1;
}

message ListChannelsRequest {}
message ListChannelsResponse {
  repeated ChannelInfo channels = 1;
}

message ChannelInfo {
  string id = 1;
  string type = 2;
  repeated string participants = 3;
  repeated string participant_usernames = 4;
  string name = 5;
  string last_read_id = 6;
  string last_message_id = 7;
  int32 unread_count = 8;
}

message MarkAsReadRequest {
  string channel_id = 1;
  string message_id = 2;
}

message GetMessagesRequest {
  string channel_id = 1;
  int32 limit = 2;
  string before_id = 3;
}

message GetMessagesResponse {
  repeated MessageReceived messages = 1;
}

message AddParticipantRequest {
  string channel_id = 1;
  repeated string user_ids = 2;
  repeated string usernames = 3;
}

message AddParticipantResponse {
  bool success = 1;
}
